openapi: 3.0.3
info:
  title: API FlopBox
  description: Plate-forme proxy FlopBox pour centraliser la gestion de fichiers distants via FTP.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Serveur local

components:
  securitySchemes:
    # Pour l'instant SecurityConfig autorise tout, mais on définit le schéma ici
    basicAuth:
      type: http
      scheme: basic

  parameters:
    serverHost:
      name: host
      in: path
      required: true
      description: Nom d'hôte du serveur FTP (ex: ftp.free.fr)
      schema:
        type: string
    ftpUsername:
      name: X-FTP-Username
      in: header
      required: false
      schema:
        type: string
        default: anonymous
    ftpPassword:
      name: X-FTP-Password
      in: header
      required: false
      schema:
        type: string
        format: password
    filePath:
      name: path
      in: query
      required: true
      description: Chemin complet vers le fichier ou répertoire
      schema:
        type: string

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object

paths:
  # --- GESTION DES SERVEURS ---
  /api/v1/servers:
    post:
      summary: Ajouter un serveur
      tags: [Gestion des Serveurs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerRequest'
      responses:
        '201':
          description: Serveur créé
    get:
      summary: Lister les serveurs
      tags: [Gestion des Serveurs]
      responses:
        '200':
          description: Liste des serveurs récupérée

  /api/v1/servers/{host}:
    put:
      summary: Mettre à jour un serveur
      tags: [Gestion des Serveurs]
      parameters:
        - $ref: '#/components/parameters/serverHost'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerRequest'
      responses:
        '200':
          description: Serveur mis à jour

  # --- GESTION DES RÉPERTOIRES ---
  /api/v1/servers/{host}/directories:
    get:
      summary: Lister le contenu d'un dossier
      tags: [Répertoires]
      parameters:
        - $ref: '#/components/parameters/serverHost'
        - $ref: '#/components/parameters/filePath'
        - $ref: '#/components/parameters/ftpUsername'
        - $ref: '#/components/parameters/ftpPassword'
      responses:
        '200':
          description: Liste des fichiers récupérée

    post:
      summary: Créer un dossier
      tags: [Répertoires]
      parameters:
        - $ref: '#/components/parameters/serverHost'
        - $ref: '#/components/parameters/filePath'
        - $ref: '#/components/parameters/ftpUsername'
        - $ref: '#/components/parameters/ftpPassword'
      responses:
        '201':
          description: Répertoire créé

    delete:
      summary: Supprimer un dossier
      tags: [Répertoires]
      parameters:
        - $ref: '#/components/parameters/serverHost'
        - $ref: '#/components/parameters/filePath'
      responses:
        '200':
          description: Dossier supprimé

  # --- GESTION DES FICHIERS ---
  /api/v1/servers/{host}/files:
    get:
      summary: Télécharger un fichier
      tags: [Fichiers]
      parameters:
        - $ref: '#/components/parameters/serverHost'
        - $ref: '#/components/parameters/filePath'
      responses:
        '200':
          description: Flux binaire du fichier
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

    post:
      summary: Envoyer un fichier (Upload)
      tags: [Fichiers]
      parameters:
        - $ref: '#/components/parameters/serverHost'
        - $ref: '#/components/parameters/filePath'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Upload réussi

    patch:
      summary: Renommer un fichier
      tags: [Fichiers]
      parameters:
        - $ref: '#/components/parameters/serverHost'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                oldName:
                  type: string
                newName:
                  type: string
      responses:
        '200':
          description: Renommage réussi

  # --- RECHERCHE ---
  /api/v1/servers/{host}/search:
    get:
      summary: Recherche sur un serveur spécifique
      tags: [Gestion des Serveurs]
      parameters:
        - $ref: '#/components/parameters/serverHost'
        - name: searchQuery
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Résultats de recherche